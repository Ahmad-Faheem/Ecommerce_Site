{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce | Change Password</title>
    <link rel="stylesheet" href="{% static 'Vender/auth.css' %}">
</head>

<body>
    <main>
        <div>
            <div id="main_heading_box">
                <h2>Reset Password</h2>
                <p>Make Sure to Save Your New Password.</p>
            </div>
            <form id="form" method="">
                <div class="input-container">
                    <input id="new_password" type="password" placeholder=" " required>
                    <label for="new_password">New Password</label>
                </div>
                <div class="input-container">
                    <input id="confirm_password" type="password" placeholder=" " required>
                    <label for="confirm_password">Confirm Password</label>
                </div>
                <button type="submit">Change Password</button>
            </form>
        </div>
    </main>

</body>

</html>
