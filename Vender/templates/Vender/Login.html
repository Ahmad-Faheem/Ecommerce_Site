{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor | Login</title>
    <link rel="stylesheet" href="{% static 'Vender/auth.css' %}">
</head>

<body>
    <main>
        <div>
            <div id="main_heading_box">
                <h2>Welcome Back</h2>
                <p>Manage your shop and track your sales.</p>
            </div>

            <form id="login_form" action="#" method="POST">
                <div id='form_heading'>
                    <h4>Vendor Login</h4>
                    <p>Enter your credentials to access your dashboard.</p>
                </div>

                <div class="input-container">
                    <input id="v_email" name="email" type="email" placeholder=" " required>
                    <label for="v_email">Email Address</label>
                </div>

                <div class="input-container">
                    <input id="v_pass" name="password" type="password" placeholder=" " required>
                    <label for="v_pass">Password</label>
                </div>

                <div class="forgot-pass">
                    <a href="{% url 'Vender:Forget_Password' %}">Forgot Password?</a>
                </div>

                <button type="submit">Log In to Dashboard</button>

                <div id="form_bottom_line">
                    <p>New Here? </p>
                    <a href="{% url 'Vender:Register' %}">Register Now</a>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
