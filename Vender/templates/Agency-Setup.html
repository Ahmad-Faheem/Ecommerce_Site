<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellzy | Agency Setup Wizard</title>
    <style>
        :root {
            --primary: #088178;
            --primary-hover: #096660;
            --gray-text: #696c6e;
            --light-bg: #f4f7f6;
            --white: #ffffff;
            --border: #ced4da;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); padding: 40px 15px; }

        .wizard-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            padding: 40px;
        }

        /* Stepper Header */
        .stepper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }
        .stepper::before {
            content: "";
            position: absolute;
            top: 15px; left: 0; width: 100%; height: 2px;
            background: #e0e0e0; z-index: 1;
        }
        .step-circle {
            width: 35px; height: 35px; background: #e0e0e0;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; z-index: 2; font-weight: bold;
            color: white; transition: 0.3s;
        }
        .step-circle.active { background: var(--primary); }
        .step-circle.completed { background: var(--primary); }

        /* Typography */
        h2 { color: var(--primary); margin-bottom: 10px; text-align: center; }
        p.subtitle { color: var(--gray-text); text-align: center; margin-bottom: 30px; }
        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Layout */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .full-width { grid-column: span 2; }

        .input-container { position: relative; margin-bottom: 5px; }
        .input-container input, .input-container select, .input-container textarea {
            width: 100%; padding: 12px 18px; border: 1px solid var(--border);
            border-radius: 25px; font-size: 16px; outline: none; background: transparent;
        }
        .input-container textarea { border-radius: 15px; height: 100px; resize: none; }
        
        .input-container label {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            background: white; padding: 0 5px; color: #8a8a8a; pointer-events: none;
            transition: 0.2s; font-size: 16px;
        }
        .input-container textarea + label { top: 25px; }

        .input-container input:focus + label, 
        .input-container input:not(:placeholder-shown) + label,
        .input-container select:focus + label,
        .input-container select:not([value=""]):valid + label,
        .input-container textarea:focus + label,
        .input-container textarea:not(:placeholder-shown) + label {
            top: 0; font-size: 14px; color: var(--primary);
        }

        .input-container input:focus, .input-container textarea:focus { border-color: var(--primary); }

        /* Custom File Input */
        .file-input-group { display: flex; flex-direction: column; gap: 8px; }
        .file-input-group label { font-size: 14px; color: var(--gray-text); margin-left: 10px; }
        .file-input-group input { font-size: 13px; }

        /* Radio Buttons */
        .radio-group { margin-top: 10px; }
        .radio-options { display: flex; gap: 20px; margin-top: 8px; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .radio-item input { accent-color: var(--primary); width: 18px; height: 18px; }

        /* Navigation Buttons */
        .btn-container { display: flex; justify-content: space-between; margin-top: 35px; }
        button {
            padding: 12px 30px; border-radius: 25px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-next { background: var(--primary); color: white; }
        .btn-next:hover { background: var(--primary-hover); }
        .btn-back { background: #e0e0e0; color: #555; }
        .btn-back:hover { background: #d0d0d0; }
        .hidden { display: none; }

        .error-text { color: #d9534f; font-size: 12px; margin-left: 15px; display: none; }
        .required-star { color: #d9534f; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="wizard-container">
    <h2>Agency Setup</h2>
    <p class="subtitle">Complete these 3 steps to launch your store.</p>

    <div class="stepper">
        <div class="step-circle active" id="step-1-circle">1</div>
        <div class="step-circle" id="step-2-circle">2</div>
        <div class="step-circle" id="step-3-circle">3</div>
    </div>

    <form id="agency-wizard">
        <div class="form-step active" id="step-1">
            <div class="form-grid">
                <div class="input-container full-width">
                    <input id="store_name" type="text" placeholder=" " required>
                    <label>Store Name <span class="required-star">*</span></label>
                    <span class="error-text">Store name is required</span>
                </div>
                <div class="file-input-group">
                    <label>Store Logo <span class="required-star">*</span></label>
                    <div class="input-container">
                        <input id="store_logo" type="file" accept="image/*" required>
                    </div>
                </div>
                <div class="file-input-group">
                    <label>Agency Banner (Optional)</label>
                    <div class="input-container">
                        <input id="store_banner" type="file" accept="image/*">
                    </div>
                </div>
                <div class="input-container full-width">
                    <textarea id="store_about" placeholder=" " required></textarea>
                    <label>About / Description <span class="required-star">*</span></label>
                </div>
            </div>
        </div>

        <div class="form-step" id="step-2">
            <div class="form-grid">
                <div class="input-container">
                    <input id="city" type="text" placeholder=" " required>
                    <label>City of Operations <span class="required-star">*</span></label>
                </div>
                <div class="input-container">
                    <input id="b_phone" type="tel" placeholder=" " required>
                    <label>Business Phone <span class="required-star">*</span></label>
                </div>
                <div class="input-container full-width">
                    <input id="b_address" type="text" placeholder=" " required>
                    <label>Business Address <span class="required-star">*</span></label>
                </div>
                <div class="input-container full-width">
                    <input id="warehouse" type="text" placeholder=" " required>
                    <label>Pickup / Warehouse Address <span class="required-star">*</span></label>
                </div>
            </div>
        </div>

        <div class="form-step" id="step-3">
            <div class="form-grid">
                <div class="input-container">
                    <input id="proc_time" type="text" placeholder=" " required>
                    <label>Processing Time (e.g. 2 days) <span class="required-star">*</span></label>
                </div>
                <div class="input-container">
                    <select id="return_limit" required>
                        <option value="" disabled selected></option>
                        <option value="0">No Returns</option>
                        <option value="7">7 Days</option>
                        <option value="15">15 Days</option>
                        <option value="30">30 Days</option>
                    </select>
                    <label>Return Policy (Days) <span class="required-star">*</span></label>
                </div>
                <div class="input-container full-width">
                    <input id="return_address" type="text" placeholder=" " required>
                    <label>Return Address <span class="required-star">*</span></label>
                </div>
                <div class="radio-group full-width">
                    <p style="font-size: 14px; color: var(--gray-text);">Shipping Method <span class="required-star">*</span></p>
                    <div class="radio-options">
                        <label class="radio-item">
                            <input type="radio" name="ship_method" value="self" checked> Self Shipping
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="ship_method" value="platform"> Platform Services
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button type="button" id="backBtn" class="btn-back hidden">Back</button>
            <button type="button" id="nextBtn" class="btn-next" style="margin-left: auto;">Next</button>
        </div>
    </form>
</div>

<script>
    const steps = document.querySelectorAll(".form-step");
    const circles = document.querySelectorAll(".step-circle");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");
    let currentStep = 0;

    // LocalStorage Keys
    const STORAGE_KEY = "sellzy_agency_draft";

    // Load Data from LocalStorage
    function loadSavedData() {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved) {
            Object.keys(saved).forEach(key => {
                const el = document.getElementById(key);
                if (el && el.type !== 'file') el.value = saved[key];
            });
        }
    }

    // Save Data to LocalStorage
    function saveData() {
        const data = {};
        document.querySelectorAll("#agency-wizard input, #agency-wizard textarea, #agency-wizard select").forEach(el => {
            if (el.id && el.type !== 'file') data[el.id] = el.value;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function updateWizard() {
        steps.forEach((step, index) => {
            step.classList.toggle("active", index === currentStep);
            circles[index].classList.toggle("active", index === currentStep);
            circles[index].classList.toggle("completed", index < currentStep);
        });

        backBtn.classList.toggle("hidden", currentStep === 0);
        nextBtn.innerText = currentStep === steps.length - 1 ? "Complete Setup" : "Next";
    }

    function validateStep() {
        const activeStep = steps[currentStep];
        const inputs = activeStep.querySelectorAll("input[required], textarea[required], select[required]");
        let valid = true;

        inputs.forEach(input => {
            if (!input.value.trim()) {
                input.style.borderColor = "#d9534f";
                valid = false;
            } else {
                input.style.borderColor = "#ced4da";
            }
        });
        return valid;
    }

    nextBtn.addEventListener("click", () => {
        if (validateStep()) {
            saveData();
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateWizard();
            } else {
                alert("Agency Setup Submitted Successfully!");
                localStorage.removeItem(STORAGE_KEY); // Clear security sensitive data
                window.location.href = "/vendor/dashboard/"; // Example redirect
            }
        }
    });

    backBtn.addEventListener("click", () => {
        if (currentStep > 0) {
            currentStep--;
            updateWizard();
        }
    });

    // Auto-save on input
    document.addEventListener("input", saveData);
    window.onload = loadSavedData;
</script>

</body>
</html>
