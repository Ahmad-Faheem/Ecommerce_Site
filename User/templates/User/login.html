{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User | Log In</title>
    <link rel="stylesheet" href="{% static 'User/auth.css' %}">
</head>

<body>
    <main>
        <div>
            <div id="main_heading_box">
                <h2>Welcome Back</h2>
                <p>Log In to your Account & Continue buying.</p>
            </div>
            <form id="form" method="">
                <div id='form_heading'>
                    <h4>Log In</h4>
                    <p>Enter your Credentials to Login to your Account.</p>
                </div>
                <div class="input-container">
                    <input id="email" type="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>
                <div class="input-container">
                    <input id="password" type="password" placeholder=" " required>
                    <label for="password">Enter Your Password</label>
                </div>
                <div class="forgot-pass">
                    <a href="{% url 'User:forget_password' %}">Forgot Password?</a>
                </div>
                <button type="submit">Log In</button>
                <div id="form_bottom_line">
                    <p>Don't have an Account? </p>
                    <a id='signup' href="{% url 'User:signup' %}">SignUp</a>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
