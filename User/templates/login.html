<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce | Log In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        main {
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main > div {
            padding-top: 30px;
            width: 410px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        #main_heading_box {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
        }

        #main_heading_box h2 {
            color: rgb(8, 129, 120);
            font-size: 35px;
        }

        #main_heading_box p {
            color: #696c6e;
            font-size: 19px;
        }

        #contact_form {
            width: 100%;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.4);
            padding: 25px;
        }
        
        #contact_form_heading h4 {
            width: 100%;
            font-size: 22px;
            margin-bottom: 5px;
            font-weight: normal;
        }

        #contact_form_heading p {
            font-size: 17px;
            color: #696c6e;
            margin-bottom: 5px;
        }

        #contact_form button {
            width: 100%;
            border: none;
            background-color: rgb(8, 129, 120);
            padding: 11px;
            font-size: 17px;
            cursor: pointer;
            color: #e7e2e2;
            border-radius: 25px;
            transition: background-color 0.25s;
        }

        #contact_form button:hover {
            background-color: rgb(9, 102, 96);
        }

        .input-container {
            position: relative;
        }

        .input-container input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: transparent;
            transition: border-color 0.2s;
        }

        .input-container label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background-color: white;
            padding: 0 5px;
            color: #8a8a8a;
            pointer-events: none;
            transition: 0.2s ease-all;
            font-size : 18px;
        }

        .input-container input:focus+label,
        .input-container input:not(:placeholder-shown)+label {
            top: 0;
            font-size: 17px;
            color: #088178;
        }

        .input-container input:focus {
            border: 1px solid #088178;
        }

        #form_bottom_box{
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap : 5px;
        }

        #form_bottom_line {
            display: flex;
            gap : 3px;
        }

        #form_bottom_line a {
            text-decoration: none;
            display: inline-block;
            color: rgb(8, 129, 120);
        }

        #form_bottom_line p,
        #forget_password_line {
            border: none;
            background-color: rgba(0, 0, 255, 0);
            font-size: 17px;
            cursor: pointer;
            color: #696c6e;
            border-radius: 8px;
        }

        @media(max-width : 560px) {
            main>div {
                width: 90%;
            }
        }
    </style>
</head>

<body>
    <main>
        <div>
            <div id="main_heading_box">
                <h2>Welcome Back</h2>
                <p>Log In to your Account & Continue buying.</p>
            </div>
            <form id="contact_form" method="">
                <div id='contact_form_heading'>
                    <h4>Log In</h4>
                    <p>Enter your Credentials to Login to your Account.</p>
                </div>
                <div class="input-container">
                    <input id="email" type="email" placeholder=" " required>
                    <label for="email">Email Address</label>
                </div>
                <div class="input-container">
                    <input id="password" type="password" placeholder=" " required>
                    <label for="password">Enter Your Password</label>
                </div>
                <button type="submit">Log In</button>
                <div id="form_bottom_box">
                    <a id="forget_password_line" href="./forget-password.html">Forget Password?</a>
                    <div id="form_bottom_line">
                        <p>Don't have an Account? </p>
                        <a id='signup' href="./signup.html">SignUp</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
