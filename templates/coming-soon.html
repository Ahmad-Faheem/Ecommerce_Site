<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #2d3436;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            color: #636e72;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Countdown Styles */
        .countdown-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .time-circle {
            border: 1px solid #ff7675;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .time-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3436;
        }

        .time-label {
            font-size: 0.75rem;
            color: #636e72;
        }

        .separator {
            font-weight: bold;
            color: #2d3436;
            font-size: 1.5rem;
        }

        /* Form Styles */
        .notify-form {
            display: flex;
            background: #fff;
            border: 1px solid #dfe6e9;
            border-radius: 50px;
            overflow: hidden;
            max-width: 450px;
            margin: 0 auto 30px;
            padding: 5px;
            transition: border-color 0.3s;
        }

        .notify-form:focus-within {
            border-color: #008080;
        }

        .input-group {
            display: flex;
            align-items: center;
            padding-left: 20px;
            flex-grow: 1;
        }

        .input-group svg {
            color: #b2bec3;
            margin-right: 10px;
        }

        input[type="email"] {
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
        }

        button {
            background-color: #008080;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #006666;
            transform: translateY(-1px);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #2d3436;
            font-size: 0.9rem;
            font-weight: 600;
            gap: 8px;
        }

        .back-link:hover {
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .countdown-container {
                gap: 8px;
            }

            .time-circle {
                width: 65px;
                height: 65px;
            }

            .notify-form {
                flex-direction: column;
                border-radius: 20px;
                border: none;
            }

            .input-group {
                padding: 15px;
                border: 1px solid #dfe6e9;
                border-radius: 15px;
                margin-bottom: 10px;
            }

            button {
                width: 100%;
                border-radius: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Coming Soon</h1>
        <p>We couldn't find the page you were looking for.<br>We suggest you return to homepage.</p>

        <div class="countdown-container">
            <div class="time-circle">
                <span class="time-value" id="days">241</span>
                <span class="time-label">Days</span>
            </div>
            <div class="separator">:</div>
            <div class="time-circle">
                <span class="time-value" id="hours">06</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="separator">:</div>
            <div class="time-circle">
                <span class="time-value" id="minutes">50</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="separator">:</div>
            <div class="time-circle">
                <span class="time-value" id="seconds">17</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <form class="notify-form">
            <div class="input-group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <button type="submit">Get Notify</button>
        </form>

        <a href="#" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Return to Homepage
        </a>
    </div>

    <script>

        // Comming Soon Time counter Logic 
        const countdownDate = new Date().getTime() + (241 * 24 * 60 * 60 * 1000);

        const updateCountdown = () => {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(interval);
                document.querySelector(".countdown-container").innerHTML = "<h3>Launched!</h3>";
            }
        };

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();

    </script>
</body>

</html>
