<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        /* Illustration Styling */
        .illustration {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 40px;
        }

        .illustration svg {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 3rem;
            color: #2d3436;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #636e72;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            padding: 0 20px;
        }

        /* Button Styling */
        .btn-home {
            display: inline-block;
            background-color: #0e8375; /* Teal color from your image */
            color: #ffffff;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(14, 131, 117, 0.3);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-home:hover {
            background-color: #0a6b60;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 131, 117, 0.4);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            p { font-size: 1rem; }
            .illustration { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="illustration">
            <svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
                <circle cx="200" cy="300" r="15" fill="#2d3436"/>
                <circle cx="300" cy="300" r="15" fill="#2d3436"/>
                <path d="M100 50 L150 50 L180 250 L350 250 L380 80 L160 80" stroke="#2d3436" stroke-width="8" fill="none" stroke-linejoin="round"/>
                <path d="M180 200 L365 200" stroke="#dfe6e9" stroke-width="4"/>
                <path d="M170 150 L375 150" stroke="#dfe6e9" stroke-width="4"/>
                <path d="M160 100 L380 100" stroke="#dfe6e9" stroke-width="4"/>
                <rect x="200" y="160" width="60" height="30" rx="5" fill="#0e8375" opacity="0.8" transform="rotate(-10 230 175)"/>
                <rect x="270" y="170" width="50" height="25" rx="5" fill="#0e8375" opacity="0.6" transform="rotate(5 295 182)"/>
                <ellipse cx="250" cy="330" rx="150" ry="10" fill="#f0f2f2"/>
            </svg>
        </div>

        <h1>Oops!</h1>
        <p>Sorry, we couldn't find that page. Try going back or <br> checking out our homepage.</p>

        <a href="/" class="btn-home" id="backBtn">Back To Home</a>
    </div>

    <script>
        // Simple interactive logic
        document.getElementById('backBtn').addEventListener('click', function(e) {
            // If this is used in a real app, you might want to log the error or redirect
            console.log("Redirecting user to homepage...");
            
            // Optional: If you want the button to literally go "back" in history:
            // e.preventDefault();
            // window.history.back();
        });
    </script>
</body>
</html>
