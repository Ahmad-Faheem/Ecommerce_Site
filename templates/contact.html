<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce | Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        main {
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main > div {
            width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        #main_heading_box {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 100%;
        }

        #main_heading_box h2 {
            color: rgb(8, 129, 120);
            font-size: 35px;
        }

        #main_heading_box p {
            color: #696c6e;
            font-size: 19px;
        }

        #contact_form {
            width: 100%;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.4);
            padding: 25px;
        }

        #contact_form button {
            width: 100%;
            border: none;
            background-color: rgb(8, 129, 120);
            padding: 11px;
            font-size: 17px;
            cursor: pointer;
            color: #e7e2e2;
            border-radius: 25px;
            transition: background-color 0.25s;
        }

        #contact_form button:hover {
            background-color: rgb(9, 102, 96);
        }

        .input-container {
            position: relative;
        }

        .input-container textarea,
        .input-container input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            background: transparent;
            transition: border-color 0.2s;
        }

        .input-container label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background-color: white;
            padding: 0 5px;
            color: #8a8a8a;
            pointer-events: none;
            transition: 0.2s ease-all;
            font-size : 18px;
        }

        .textarea label {
            top: 20%;
        }

        .input-container textarea:focus+label,
        .input-container input:focus+label,
        .input-container input:not(:placeholder-shown)+label {
            top: 0;
            font-size: 17px;
            color: #088178;
        }

        .input-container textarea:focus,
        .input-container input:focus {
            border: 1px solid #088178;
        }

        @media(max-width : 560px) {
            main > div {
                width : 90%;
            }
        }
    </style>
</head>

<body>
    <main>
        <div>
            <div id="main_heading_box">
                <h2>Contact Us</h2>
                <p>Get in Touch with Us! We're here to assist you.</p>
            </div>
            <form id="contact_form" method="">
                <div class="input-container">
                    <input id="name" type="text" placeholder=" " required>
                    <label for="name">Your Name</label>
                </div>
                <div class="input-container">
                    <input id="email"type="email" placeholder=" " required>
                    <label for="email">Your Email</label>
                </div>
                <div class="input-container textarea">
                    <textarea id="message" rows=5 placeholder="" required></textarea>
                    <label for="message">Type Your Message</label>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>
    
</body>

</html>
